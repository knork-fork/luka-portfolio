server {
    listen 80 default;
    server_name _;

    client_max_body_size 108M;

    # Don't allow direct access to arbitrary *.php paths
    location ~ \.php$ { return 404; }

    access_log /var/log/nginx/application.access.log;
    error_log /var/log/nginx/application.error.log;

    root /application/static;

    #### Custom 404 page: directly accessible at /404, and rendered (URL unchanged)
    #### for any 404 via the error_page directive below.
    location = /404 {
        alias /application/static/pages/404.html;
        default_type text/html;
    }
    error_page 404 /404;

    #### Home
    location = / {
        index pages/home/index.html;
    }

    #### About
    location = /about {
        alias /application/static/pages/about/index.html;
        default_type text/html;
    }

    #### Projects
    location = /projects {
        alias /application/static/pages/projects/index.html;
        default_type text/html;
    }

    #### Page sources: internal-only. The routes above (index/alias) may
    #### serve these via internal redirects; direct /pages/* URLs 404.
    location /pages/ {
        internal;
    }

    #### Blog
    location ^~ /blog {
        # serve blog_temp.html for all /blog/ requests for now, until we have the grav container set up
        try_files /pages/blog_temp.html =404;
        default_type text/html;
    }

    #### Static assets (css, js, images, etc.)
    location /static/ {
        alias /application/static/files/;
        try_files $uri =404;
    }
}