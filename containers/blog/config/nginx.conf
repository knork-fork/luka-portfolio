server {
    listen 80 default;
    server_name _;

    client_max_body_size 108M;

    # Don't allow direct access to arbitrary *.php paths
    location ~ \.php$ { return 404; }

    access_log /var/log/nginx/blog.access.log;
    error_log /var/log/nginx/blog.error.log;

    # Served content lives under static/
    # The pages/ and posts/ subtrees are build output from scripts/compose_posts.sh.
    root /application/static;

    #### Custom 404: render the webserver's /404 page (URL and 404 status preserved).
    error_page 404 @not_found;
    location @not_found {
        # Use Docker's embedded DNS and a variable so the upstream is resolved
        # per-request rather than at startup (avoids boot-order crash loops).
        resolver 127.0.0.11 valid=30s;
        set $portfolio_upstream webserver;
        proxy_pass http://$portfolio_upstream/404;
    }

    #### Blog index (with and without trailing slash)
    location = /blog {
        try_files /pages/index.html =404;
        default_type text/html;
    }
    location = /blog/ {
        try_files /pages/index.html =404;
        default_type text/html;
    }

    #### Paginated index and topic listings all render the blog index; blog.js
    #### reads the URL and filters/paginates client-side. These must precede the
    #### single-post rule below (among regex locations the first match wins).
    #### /blog/<n> -> page n
    location ~ ^/blog/[0-9]+/?$ {
        try_files /pages/index.html =404;
        default_type text/html;
    }
    #### /blog/topic/<topic> and /blog/topic/<topic>/<n>
    location ~ ^/blog/topic/[^/]+(/[0-9]+)?/?$ {
        try_files /pages/index.html =404;
        default_type text/html;
    }

    #### Blog sitemap -> containers/blog/sitemap.xml (mounted at /application, outside static/)
    location = /blog/sitemap.xml {
        alias /application/sitemap.xml;
        default_type application/xml;
    }

    #### Blog-prefixed assets fall back to the shared /static/... paths
    # e.g. /blog/static/dist/style.a9e56afd.css -> /static/dist/style.a9e56afd.css
    location ^~ /blog/static/ {
        rewrite ^/blog(/static/.*)$ $1 last;
    }

    #### Single blog post -> static/posts/<slug>.html
    location ~ ^/blog/([^/]+)/?$ {
        try_files /posts/$1.html =404;
        default_type text/html;
    }

    #### Static assets (css, js, images, etc.)
    # Served from this blog container when present, otherwise proxied to the
    # portfolio webserver, which owns shared assets like style.a9e56afd.css.
    location /static/ {
        try_files $uri @portfolio;
    }

    location @portfolio {
        # Use Docker's embedded DNS and a variable so the upstream is resolved
        # per-request rather than at startup (avoids boot-order crash loops).
        resolver 127.0.0.11 valid=30s;
        set $portfolio_upstream webserver;
        proxy_pass http://$portfolio_upstream;
    }
}
