  <section class="blog-controls">
    <div class="blog-controls-row">
      <input class="blog-search" type="search" placeholder="Search posts..." aria-label="Search posts" autocomplete="off">
      <div class="blog-tags-menu">
        <button class="blog-tags-toggle" type="button" aria-haspopup="true" aria-expanded="false">Tags</button>
        <div class="blog-tags-popover" hidden>
          <button class="blog-tags-clear" type="button">Clear filters</button>
          <div class="blog-filter" role="group" aria-label="Filter posts by tag">
{{TAG_CHIPS}}          </div>
        </div>
      </div>
    </div>
  </section>
